server:
  port: 8081

spring:
  application:
    name: upi-payment-system

  datasource:
    url: jdbc:postgresql://localhost:5432/upi_payment_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect