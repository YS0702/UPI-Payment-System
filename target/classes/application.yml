server:
  port: 8081

spring:
  application:
    name: upi-payment-system

  datasource:
    url: jdbc:mysql://localhost:3306/upi_payment_system
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
